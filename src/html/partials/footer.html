<script>
  const worksVideo = document.querySelector(".works__video");

  if (worksVideo) {
    worksVideo.addEventListener("click", function () {
      const video = this.dataset.video;

      this.innerHTML = `
            <iframe
                src="${video}"
                title="YouTube video player"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
                frameborder="0">
            </iframe>
        `;
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    const animatedItems = document.querySelectorAll(".anim");

    const observer = new IntersectionObserver(
        (entries, observer) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;

                const siblings = [...entry.target.parentNode.querySelectorAll(".anim")];

                siblings.forEach((el, index) => {
                    setTimeout(() => {
                        el.classList.add("show");
                    }, index * 120);
                    observer.unobserve(el);
                });
            });
        },
        {
            threshold: 0.15
        }
    );

    animatedItems.forEach(item => observer.observe(item));
});
</script>
